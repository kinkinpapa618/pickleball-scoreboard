<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRONGTAISO.COM - Referee Suport !</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: 'Be Vietnam Pro', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- Fullscreen Premium Loading Screen -->
    <div id="app-loading" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #0b0f19;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    ">
      <div style="
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        animation: loadingFadeIn 1s ease-out;
      ">
        <!-- App Logo Container -->
        <div style="
          width: 100px;
          height: 100px;
          border-radius: 24px;
          background: linear-gradient(135deg, #1e3a8a, #3b82f6);
          display: flex;
          align-items: center;
          justify-content: center;
          box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
          position: relative;
        ">
          <!-- Outer Pulsing Glow -->
          <div style="
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 30px;
            border: 2px solid rgba(59, 130, 246, 0.4);
            animation: pulseGlow 2s infinite ease-in-out;
          "></div>
          <img src="/app-icon.png" alt="App Icon" style="
            width: 76px;
            height: 76px;
            object-fit: contain;
          " onerror="this.src='/favicon.png'" />
        </div>

        <!-- Text Title -->
        <div style="display: flex; flex-direction: column; align-items: center; gap: 0.25rem;">
          <span style="
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
          ">TRỌNG TÀI SỐ</span>
          <span style="
            color: #64748b;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
          ">TRONGTAISO.COM</span>
        </div>

        <!-- Premium Linear Progress Bar -->
        <div style="
          width: 140px;
          height: 4px;
          background-color: rgba(255, 255, 255, 0.08);
          border-radius: 9999px;
          overflow: hidden;
          position: relative;
          margin-top: 0.5rem;
        ">
          <div style="
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 9999px;
            animation: progressFlow 1.5s infinite ease-in-out;
          "></div>
        </div>
      </div>
    </div>

    <!-- Styles for Loading Keyframes -->
    <style>
      @keyframes loadingFadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes pulseGlow {
        0% { transform: scale(0.9); opacity: 0.1; }
        50% { transform: scale(1.05); opacity: 0.6; }
        100% { transform: scale(0.9); opacity: 0.1; }
      }
      @keyframes progressFlow {
        0% { left: -100%; width: 50%; }
        50% { width: 70%; }
        100% { left: 150%; width: 50%; }
      }
    </style>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
